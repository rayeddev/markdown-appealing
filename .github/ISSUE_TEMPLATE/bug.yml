name: Bug
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happens
      placeholder: Describe the broken behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a markdown file with...
        2. Toggle...
        3. See...
  - type: dropdown
    id: pipeline
    attributes:
      label: Pipeline
      options:
        - "shaping"
        - "todo"
    validations:
      required: true
